<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: sans-serif;
      padding: 16px;
      min-width: 190px;
    }
    h3 {
      margin: 0 0 12px;
      font-size: 14px;
    }
    label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: #555;
    }
    select {
      width: 100%;
      padding: 6px 8px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .stats {
      margin-top: 14px;
      padding: 8px 10px;
      background: #f5f5f5;
      border-radius: 4px;
      font-size: 12px;
      color: #444;
      line-height: 1.7;
    }
    .stats span {
      font-weight: bold;
      color: #222;
    }
    .note {
      margin-top: 10px;
      font-size: 11px;
      color: #888;
    }
  </style>
</head>
<body>
  <h3>Manga Upscaler</h3>
  <label for="scale">Escala</label>
  <select id="scale">
    <option value="2">2x</option>
    <option value="3">3x</option>
    <option value="4">4x</option>
  </select>
  <div class="stats">
    Imágenes en caché: <span id="count">—</span><br>
    RAM usada: <span id="ram">—</span>
  </div>
  <p class="note">El cambio de escala aplica en la próxima recarga.</p>
  <script src="popup.js"></script>
</body>
</html>
